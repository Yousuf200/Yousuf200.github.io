title: "The Path"
description: " A Journey of Life, Purpose, Discovery..."
author: "Yousuf"
baseurl: ""  # Leave blank for GitHub Pages
url: "https://yousuf200.github.io"  # Your GitHub Pages URL

# Theme
remote_theme: mmistakes/minimal-mistakes  # Using Minimal Mistakes
minimal_mistakes_skin: dark  # Dark theme

# Navigation Menu
nav:
  - title: Home
    url: /
  - title: Blog
    url: /blog/
  - title: About
    url: /about/
  - title: Contact
    url: /contact/

# Markdown & Syntax Highlighting
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Pagination
paginate: 5
paginate_path: "/page:num/"

# Sidebar Settings
sidebar:
  nav: "navigation"
  subscribe: "/feed.xml"

# Social Links
social:
  github: Yousuf200
  linkedin: yourprofile
  instagram: test

# Logo (Add your logo image in /assets/images/)
logo: "/assets/images/logo.png"



# Footer Message
email: snuyousuf@gmail.com
quote: >-
  "العلم حياة القلوب ومصباح الأبصار."  
  📖 نهج البلاغة، الحكمة 147  
  ("Knowledge is the life of hearts and the light of the eyes.")
