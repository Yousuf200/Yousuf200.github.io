title: "بِسْمِ ٱللَّٰهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ | My Spiritual Journey"
description: "Exploring life, faith, and purpose through spirituality and self-discovery."
author: "Yousuf"
baseurl: ""  # Leave blank for GitHub Pages
url: "https://yousuf200.github.io"  # Your GitHub Pages URL

# Theme (Replace with your chosen theme)
remote_theme: jekyll/minima  # Change to your preferred theme

# Navigation Menu
nav:
  - name: Home
    url: /
  - name: Blog
    url: /blog
  - name: About
    url: /about
  - name: Contact
    url: /contact

# Markdown Settings
markdown: kramdown
highlighter: rouge  # For syntax highlighting

# Plugins (optional but useful)
plugins:
  - jekyll-feed  # RSS feed support
  - jekyll-seo-tag  # SEO improvements
  - jekyll-sitemap  # Generates a sitemap.xml
  - jekyll-paginate  # Enables pagination

# Blog Settings
paginate: 5  # Number of posts per page
paginate_path: "/page:num/"

# Social Links (Optional)
social:
  twitter: yourusername
  github: Yousuf200
  linkedin: yourprofile

# Footer Message
email: snuyousuf@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.
footer_text: "© 2025 Yousuf | All Rights Reserved "