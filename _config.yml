title: "the Path"
description: "Life, Purpose, Discovery."
author: "Yousuf"
baseurl: ""  # Leave blank for GitHub Pages
url: "https://yousuf200.github.io"  # Your GitHub Pages URL

# Theme (Ensure the theme supports dark mode)
remote_theme: jekyll/minima  # Change if needed
minima:
  skin: dark  # Enables dark mode for Minima

# Navigation Menu
nav:
  - name: Home
    url: /
  - name: Blog
    url: /blog/
  - name: About
    url: /about/
  - name: Contact
    url: /contact/

# Markdown Settings
markdown: kramdown
highlighter: rouge  # For syntax highlighting

# Plugins (Ensuring they work properly)
plugins:
  - jekyll-feed  # RSS feed support
  - jekyll-seo-tag  # SEO improvements
  - jekyll-sitemap  # Generates a sitemap.xml
  - jekyll-paginate  # Enables pagination

# Blog Settings
paginate: 5  # Number of posts per page
paginate_path: "/page:num/"


# Sidebar Settings
sidebar:
  nav: "navigation"
  subscribe: "/feed.xml"

# Social Links
social:
  github: Yousuf200
  linkedin: yourprofile
  instagram: test

# Logo (Add your logo image in /assets/images/)
logo: "/assets/images/logo.png"



# Footer Message
email: snuyousuf@gmail.com
quote: >-
  "العلم حياة القلوب ومصباح الأبصار."  
  📖 نهج البلاغة، الحكمة 147  
  ("Knowledge is the life of hearts and the light of the eyes.")
footer_text: "© 2025 Yousuf | All Rights Reserved"
